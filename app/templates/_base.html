<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Telegram Watcher{% endblock %}</title>
  <link rel="stylesheet" href="/static/xan.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      margin: 0;
      background: #fafafa;
      color: #1a1a1a;
    }
    .layout { display: flex; min-height: 100vh; }
    nav.side {
      width: 220px; flex: 0 0 220px;
      background: #ffffff; border-right: 1px solid #eaeaea;
      padding: 24px 16px;
    }
    nav.side h1 {
      font-size: 15px; margin: 0 0 18px 0; font-weight: 700; letter-spacing: -0.01em;
    }
    nav.side a {
      display: block; padding: 8px 10px;
      color: #1a1a1a; text-decoration: none;
      border-radius: 6px; font-size: 13px;
      margin-bottom: 2px;
    }
    nav.side a:hover { background: #f4f4f5; }
    nav.side a.active { background: #111; color: #fff; }
    main.body { flex: 1; padding: 28px 36px; }
    header.page-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 22px;
    }
    h2.page-title { margin: 0; font-size: 22px; letter-spacing: -0.02em; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      display: inline-block; padding: 5px 10px; font-size: 12px;
      border: 1px solid #e5e5e5; border-radius: 999px;
      color: #555; text-decoration: none; background: #fff;
    }
    .chip.active { background: #111; color: #fff; border-color: #111; }
    .chip:hover:not(.active) { background: #f4f4f5; }
    table {
      width: 100%; border-collapse: collapse; background: #fff;
      border: 1px solid #eaeaea; border-radius: 8px; overflow: hidden;
    }
    th, td {
      padding: 12px 14px; text-align: left; font-size: 13px;
      border-bottom: 1px solid #f0f0f0; vertical-align: top;
    }
    th { background: #fafafa; font-weight: 600; color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: 0; }
    .mono { font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 12px; color: #777; }
    .muted { color: #888; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; background: #f4f4f5; color: #555; font-family: ui-monospace, monospace;
    }
    .empty {
      padding: 60px 20px; text-align: center; background: #fff;
      border: 1px dashed #e5e5e5; border-radius: 8px; color: #888;
    }
    .empty-title { font-weight: 600; color: #444; margin-bottom: 6px; font-size: 14px; }
    .day-block { margin-bottom: 36px; }
    .day-header { font-size: 14px; font-weight: 600; margin: 0 0 10px 0; color: #444; }
    .group-section { margin-bottom: 18px; }
    .group-title { font-size: 13px; font-weight: 600; margin: 0 0 6px 0; }
    a.link { color: #2a5db0; text-decoration: none; }
    a.link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="layout">
    {% include "_sidebar.html" %}
    <main class="body">
      <header class="page-header">
        <h2 class="page-title">{% block page_title %}{% endblock %}</h2>
        <div class="chips">{% block header_actions %}{% endblock %}</div>
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
